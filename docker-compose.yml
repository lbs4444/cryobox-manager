services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cryobox}
      POSTGRES_USER: ${POSTGRES_USER:-cryobox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - cryobox-postgres:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M

  app:
    image: ${CRYOBOX_IMAGE:-ghcr.io/lbs4444/cryobox-manager:latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_MODE: self-hosted
      DATABASE_URL: postgresql://${POSTGRES_USER:-cryobox}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cryobox}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-8}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          memory: 768M

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  cryobox-postgres:
